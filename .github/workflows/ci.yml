# CI for the Everlane Realty PREVIEW site (engagement #149, wave 0 rail).
# DORMANT until this repo is pushed to GitHub (sergeselenko/everlane-realty-preview).
# Jobs: build + checks (sitemap XML well-formedness, JSON-LD parse, internal
# links, noindex, form-inert) on every push/PR; deploy to GitHub Pages on main
# (requires Pages enabled with Source: GitHub Actions — see README runbook).
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  # Feed-driven rebuilds (wave 2, plan §5): the n8n sync dispatches
  # `feed-sync` after data changes; the dead-man watcher dispatches
  # `feed-stale` at the 12h Rule-11 floor (build bakes the stale banner);
  # a later `feed-sync` rebuild clears it. See build/wave-2/feed-ops/.
  repository_dispatch:
    types: [feed-sync, feed-stale]

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Checks (sitemap XML, JSON-LD, internal links, noindex, form-inert)
        run: node scripts/check.mjs
      - name: KB lint (sources+dates, fair-housing patterns, Rule 32 stop-list, notice slots)
        run: node scripts/kb-lint.mjs

  deploy-preview:
    # Publishes to https://sergeselenko.github.io/everlane-realty-preview/
    # Skipped until Pages is enabled (Settings → Pages → Source: GitHub Actions).
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push')
      || github.event_name == 'repository_dispatch'
    needs: build-and-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PATH_PREFIX: /everlane-realty-preview/
      SITE_URL: https://sergeselenko.github.io/everlane-realty-preview
      # Stale banner bakes ONLY on the dead-man's feed-stale dispatch (12h floor).
      FEED_STALE: ${{ github.event.action == 'feed-stale' && '1' || '' }}
      # GA4_ID comes from repo/Actions variables when the property exists
      # (wave-2 staged ask). Absent var ⇒ no analytics markup in the build.
      GA4_ID: ${{ vars.GA4_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (with Pages path prefix)
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
